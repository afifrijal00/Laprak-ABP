<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Wireframe Exact Placement</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    /* Batasi lebar agar proporsi mirip wireframe */
    .container { max-width: 820px; }

    /* Kotak wireframe umum */
    .wf { border: 1px solid #111; box-sizing: border-box; background:#fff; }

    /* Logo kotak persegi */
    .logo {
      aspect-ratio: 1/1;
      min-height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
    }

    /* Sidebar navigasi vertikal (di bawah logo) */
    .sidebar {
      margin-top: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .sidebar .nav-item {
      padding: 10px;
      min-height: 44px;
      display: flex;
      align-items: center;
      font-weight: 600;
    }

    /* Banner/header di kanan logo */
    .banner {
      min-height: 120px;
      background: #e6e6e6;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
    }

    /* Sub-header bars hanya di dalam col-9 */
    .sub-bars .bar {
      height: 30px;
      background: #f3f3f3;
      border: 1px solid #111;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      padding-left: 12px;
      font-weight: 600;
    }

    /* Area konten kanan: struktur nested */
    .content-top {
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }
    .text-block-top {
      border: 1px solid #111;
      padding: 10px;
      min-height: 120px;
      flex: 1;
    }
    .image-box {
      background: #ccc;
      border: 1px solid #111;
      width: 220px;
      aspect-ratio: 1/1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
    }

    /* Baris teks di bawah gambar (mengisi seluruh col-9) */
    .content-below .line {
      height: 28px;
      border: 1px solid #111;
      background: #fff;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      padding-left: 10px;
    }

    /* Footer tebal hanya di bawah col-9 */
    .footer-box {
      border-top: 6px solid #111;
      padding: 10px;
      text-align: center;
      font-weight: 700;
    }

    /* Spasi kecil */
    .gap-vert { margin-bottom: 12px; }

    /* Responsive adjustments */
    @media (max-width: 767.98px) {
      .logo { min-height: 90px; aspect-ratio: auto; }
      .banner { min-height: 90px; }
      .image-box { width: 160px; min-height: 160px; }
    }
  </style>
</head>
<body>
  <div class="container mt-3 mb-4">
    <!-- ROW UTAMA: kiri col-3 (logo + sidebar), kanan col-9 (banner + subheader + konten) -->
    <div class="row">
      <!-- KIRI: col-3 -->
      <div class="col-3">
        <!-- Logo -->
        <div class="wf logo">Logo</div>

        <!-- Sidebar vertikal tepat di bawah logo -->
        <div class="sidebar mt-3">
          <div class="wf nav-item">Navigasi</div>
          <div class="wf nav-item">Link 2</div>
          <div class="wf nav-item">Link 3</div>
        </div>
      </div>

      <!-- KANAN: col-9 -->
      <div class="col-9">
        <!-- Banner/header (sejajar dengan logo) -->
        <div class="wf banner">Banner</div>

        <!-- Sub-header bars: hanya di dalam col-9 -->
        <div class="sub-bars mt-3">
          <div class="bar">Sub Header Bar 1</div>
          <div class="bar">Sub Header Bar 2</div>
        </div>

        <!-- MAIN CONTENT di dalam col-9 -->
        <div class="mt-3">
          <!-- Bagian atas: teks di kiri, gambar di kanan atas -->
          <div class="content-top">
            <div class="text-block-top">
              <div style="margin-bottom:8px;">Baris teks 1 (sejajar kiri gambar)</div>
              <div style="margin-bottom:8px;">Baris teks 2 (sejajar kiri gambar)</div>
              <div style="margin-bottom:8px;">Baris teks 3 (sejajar kiri gambar)</div>
            </div>
            <div class="image-box">Gambar</div>
          </div>

          <!-- Bagian bawah: baris teks berikutnya melebar di bawah gambar (mengisi seluruh col-9) -->
          <div class="content-below mt-3">
            <div class="line">Baris konten 4 (mengisi lebar penuh col-9)</div>
            <div class="line">Baris konten 5</div>
            <div class="line">Baris konten 6</div>
            <div class="line">Baris konten 7</div>
          </div>
        </div>

        <!-- Footer tebal hanya sejajar lebar col-9 -->
        <div class="mt-3">
          <div class="footer-box wf">Footer</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
